<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viva Market - Test de Alimentación</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://googletagmanager.com"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TPTGSJN4YP');
    </script>
    <style>
        :root {
            --primary: #1a3d1a;
            --secondary: #4a7c44;
            --accent: #e67e22;
            --cream: #f9f7f2;
            --text: #2c3e50;
            --ff: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--primary);
            font-family: var(--ff);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        #app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--cream);
            position: relative;
        }

        .screen {
            display: none;
            flex-direction: column;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            text-align: center;
        }

        .test-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        /* Asegura que el contenido sea desplazable */
        .scroll-container {
            overflow-y: auto;
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Pantalla de Inicio -->
        <div id="home" class="screen active">
            <h1 style="color: var(--primary)">Bienvenido a Viva Market</h1>
            <p>Descubre tu score de riesgo alimentario y aprende a cuidar a tu familia.</p>
            <button class="btn" onclick="showScreen('test')">Hacer el Test de Riesgo →</button>
            <a href="https://instagram.com" target="_blank" class="btn" style="background:#e1306c">Ver nuestro Instagram</a>
        </div>

        <!-- Pantalla del Test -->
        <div id="test" class="screen">
            <h2>Test de Riesgo</h2>
            <div class="test-card">
                <p>1. ¿Revisas las etiquetas de los productos procesados?</p>
                <button onclick="addScore(10)">Siempre</button>
                <button onclick="addScore(5)">A veces</button>
                <button onclick="addScore(0)">Nunca</button>
            </div>
            <div id="result-area"></div>
        </div>

        <!-- Pantalla de Resultados -->
        <div id="results" class="screen">
            <h2>Tu Resultado</h2>
            <div id="score-display" style="font-size: 3rem; text-align: center; color: var(--accent);">0</div>
            <p id="feedback"></p>
            <button class="btn" onclick="location.href='https://goo.gl'">Cómo llegar a la Feria 📍</button>
            <button class="btn" style="background:gray" onclick="location.reload()">Reiniciar</button>
        </div>
    </div>

    <script>
        let currentScore = 0;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0,0);
        }

        function addScore(points) {
            currentScore += points;
            // Aquí podrías agregar más lógica de preguntas. Por ahora vamos a resultados:
            showResults();
        }

        function showResults() {
            showScreen('results');
            document.getElementById('score-display').innerText = currentScore + " pts";
            let feedback = "";
            if(currentScore > 5) {
                feedback = "¡Buen trabajo! Estás en el camino consciente.";
            } else {
                feedback = "Atención: Tu nivel de riesgo es alto. Visita Viva Market para aprender más.";
            }
            document.getElementById('feedback').innerText = feedback;
        }
    </script>
</body>
</html>
